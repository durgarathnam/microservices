name: Microservices CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-api-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build API Gateway
        run: |
          cd api-gateway
          mvn clean install -DskipTests

  build-naming-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Naming Server
        run: |
          cd naming-server
          mvn clean install -DskipTests

  build-config-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Config Server
        run: |
          cd spring-cloud-config-server
          mvn clean install -DskipTests

  build-business-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Business Services
        run: |
          cd currency-exchange-service
          mvn clean install -DskipTests
          cd ../currency-conversion-service
          mvn clean install -DskipTests
          cd ../limit-service
          mvn clean install -DskipTests